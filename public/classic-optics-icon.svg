<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Frame bridge -->
  <path d="M26 30 Q32 26 38 30" stroke="url(#frameGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left lens -->
  <ellipse cx="18" cy="32" rx="12" ry="10" fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2.5"/>
  <!-- Right lens -->
  <ellipse cx="46" cy="32" rx="12" ry="10" fill="url(#lensGrad)" stroke="url(#frameGrad)" stroke-width="2.5"/>
  <!-- Left temple arm -->
  <path d="M6 30 L2 28" stroke="url(#frameGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Right temple arm -->
  <path d="M58 30 L62 28" stroke="url(#frameGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Lens shine left -->
  <ellipse cx="14" cy="29" rx="3" ry="2" fill="white" opacity="0.3"/>
  <!-- Lens shine right -->
  <ellipse cx="42" cy="29" rx="3" ry="2" fill="white" opacity="0.3"/>
</svg>